<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/mamayaya1/game@f3a882424a8f28d07bdf456b251d889725c4c1e4/projects/doodle-jump/">
  <meta charset="utf-8">
  <title>Doodle Jump</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <canvas id="canvas">Your browser does not support HTML5 canvas.</canvas>
    <div id="mainMenu">
      <h1>doodle jump</h1>
      <p class="info">use &larr; &rarr; to move and space to (re) start&hellip;</p>
      <a class="button" href="javascript:init()">Play</a>
    </div>
    <div id="gameOverMenu">
      <h1>game over!</h1>
      <h3 id="go_score">you scored 0 points</h3>
      <a class="button" href="javascript:reset()">Restart</a>
    </div>
    <img id="sprite" src="sprites.png" alt="">
    <div id="scoreBoard"><p id="score">0</p></div>
  </div>
  <script src="main.js"></script>
</body>
</html>
