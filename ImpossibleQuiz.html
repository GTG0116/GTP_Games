<!-- Ultimate Game Stash file -->
<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/mamayaya1/game@f3a882424a8f28d07bdf456b251d889725c4c1e4/projects/impossiblequiz/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Impossible Quiz</title>
  <style>* { margin:0; padding:0; } body { background:#000; } #ruffle { width:100vw; height:100vh; }</style>
</head>
<body>
  <div id="ruffle"></div>
  <script src="ruffle.js"></script>
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.addEventListener("load", function () {
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      var container = document.getElementById("ruffle");
      player.id = "player"; player.style.width = "100%"; player.style.height = "100%";
      container.appendChild(player);
      player.load("impossible_quiz1.swf");
    });
  </script>
</body>
</html>
