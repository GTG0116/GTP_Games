<!-- Ultimate Game Stash file -->
<!DOCTYPE html>
<html>
<head>
  <base href="https://cdn.jsdelivr.net/gh/mamayaya1/game@f3a882424a8f28d07bdf456b251d889725c4c1e4/projects/bloonstd/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bloons Tower Defense</title>
</head>
<body>
  <script src="https://3kh0.github.io/js/main.js"></script>
  <div id="ruffle" style="width:100%;height:100vh;"></div>
  <script src="ruffle.js"></script>
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.addEventListener("load", function() {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById("ruffle");
      player.id = "player";
      player.style.width = "100%";
      player.style.height = "100%";
      container.appendChild(player);
      player.load("bloons_tower_defense_1.swf");
    });
  </script>
</body>
</html>
