<!-- Ultimate Game Stash file -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Angry Birds</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #231f20; overflow: hidden; }
    .webgl-content { width: 100vw; height: 100vh; }
    #gameContainer { width: 100vw; height: 100vh; position: relative; background: #231f20; }
  </style>
  <script src="https://cdn.jsdelivr.net/gh/lee2sman/everyday@d45d601d2c4d60adf809a0b677c00b7d12aba7e9/96/TemplateData/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gertdoro/UnityExplorer@cffa09e09790018403c996d37adb6c4450e8f6c6/Runtime/birds/birds.js"></script>
  <script>
    var gameInstance = UnityLoader.instantiate(
      "gameContainer",
      "https://cdn.jsdelivr.net/gh/gertdoro/UnityExplorer@cffa09e09790018403c996d37adb6c4450e8f6c6/Runtime/birds/birds.json",
      { onProgress: UnityProgress, Module: { onRuntimeInitialized: function () { UnityProgress(gameInstance, "complete"); } } }
    );
  </script>
</head>
<body>
  <div class="webgl-content">
    <div id="gameContainer" style="width:100vw;height:100vh;"></div>
  </div>
</body>
</html>
